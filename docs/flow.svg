<svg xmlns="http://www.w3.org/2000/svg" width="980" height="760" viewBox="0 0 980 760" role="img" aria-label="AI Request Agent flow">
  <defs>
    <style>
      .box{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:8}
      .alt{fill:#fff7ed;stroke:#c2410c;stroke-width:2;rx:8}
      .text{font-family:Arial,sans-serif;font-size:20px;fill:#0f172a}
      .small{font-family:Arial,sans-serif;font-size:18px;fill:#0f172a}
      .arrow{stroke:#334155;stroke-width:2.5;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <rect x="300" y="25" width="380" height="58" class="box"/>
  <text x="490" y="61" text-anchor="middle" class="text">HTTP-запрос</text>
  <line x1="490" y1="83" x2="490" y2="125" class="arrow"/>
  <rect x="220" y="125" width="540" height="70" class="box"/>
  <text x="490" y="154" text-anchor="middle" class="small">Валидация и нормализация текста</text>
  <text x="490" y="178" text-anchor="middle" class="small">Pydantic + deterministic Python</text>
  <line x1="490" y1="195" x2="490" y2="237" class="arrow"/>
  <rect x="300" y="237" width="380" height="58" class="box"/>
  <text x="490" y="273" text-anchor="middle" class="text">Выбор провайдера</text>
  <line x1="490" y1="295" x2="490" y2="337" class="arrow"/>
  <rect x="300" y="337" width="380" height="58" class="box"/>
  <text x="490" y="373" text-anchor="middle" class="text">Ollama или Mock</text>
  <line x1="490" y1="395" x2="490" y2="437" class="arrow"/>
  <rect x="220" y="437" width="540" height="70" class="box"/>
  <text x="490" y="466" text-anchor="middle" class="small">Классификация и суммаризация</text>
  <text x="490" y="490" text-anchor="middle" class="small">request_type, priority, needs_human</text>
  <line x1="490" y1="507" x2="490" y2="549" class="arrow"/>
  <rect x="220" y="549" width="540" height="58" class="box"/>
  <text x="490" y="585" text-anchor="middle" class="text">Pydantic-валидация результата</text>
  <line x1="490" y1="607" x2="490" y2="649" class="arrow"/>
  <rect x="300" y="649" width="380" height="58" class="box"/>
  <text x="490" y="685" text-anchor="middle" class="text">JSON-ответ</text>
  <path d="M680 366 C850 366 850 548 760 578" fill="none" class="arrow"/>
  <rect x="705" y="260" width="245" height="82" class="alt"/>
  <text x="827" y="292" text-anchor="middle" class="small">Ошибка Ollama</text>
  <text x="827" y="318" text-anchor="middle" class="small">или невалидный JSON</text>
  <line x1="705" y1="301" x2="680" y2="366" class="arrow"/>
  <rect x="705" y="430" width="245" height="58" class="alt"/>
  <text x="827" y="466" text-anchor="middle" class="text">Mock fallback</text>
</svg>

